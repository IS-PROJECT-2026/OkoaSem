<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jaedon Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #06060b;
      --surface: #0e0e16;
      --border: rgba(255,255,255,0.08);
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --gold: #d4af6a;
      --violet: #8b5cf6;
      --teal: #2dd4bf;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; scroll-behavior: smooth; }
    body {
      font-family: "DM Sans", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(139, 92, 246, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(45, 212, 191, 0.08) 0%, transparent 55%),
        radial-gradient(ellipse 70% 60% at 50% 90%, rgba(212, 175, 106, 0.06) 0%, transparent 60%),
        var(--bg);
    }
    .font-display { font-family: "Syne", system-ui, sans-serif; }
    .container { max-width: 1140px; margin: 0 auto; padding: 0 24px; }
    .glass {
      background: rgba(14,14,22,.66);
      border: 1px solid var(--border);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border-radius: 16px;
    }
    .section { padding: 88px 0; }
    .section-divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(212,175,106,.38), transparent); }
    .muted { color: var(--muted); }

    nav {
      position: sticky; top: 0; z-index: 20;
      border-bottom: 1px solid rgba(255,255,255,.06);
      background: rgba(6,6,11,.78);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }
    .nav-wrap { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 0; }
    .brand { font-weight: 800; color: #fff; text-decoration: none; font-family: "Syne", system-ui, sans-serif; }
    .brand .dot { color: var(--gold); }
    .nav-links { display: flex; flex-wrap: wrap; gap: 8px; }
    .nav-links a {
      color: var(--muted); text-decoration: none; padding: 8px 12px; border-radius: 999px; font-size: 14px;
      border: 1px solid transparent;
    }
    .nav-links a.active, .nav-links a:hover { color: var(--gold); border-color: rgba(212,175,106,.28); background: rgba(212,175,106,.08); }

    .hero { min-height: 88vh; display: grid; align-items: center; grid-template-columns: 1.2fr 1fr; gap: 28px; }
    .badge {
      display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted);
      border: 1px solid var(--border); border-radius: 999px; padding: 8px 12px; margin-bottom: 18px;
    }
    .pulse { width: 8px; height: 8px; border-radius: 50%; background: #34d399; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0% { opacity: .4; } 50% { opacity: 1; } 100% { opacity: .4; } }
    h1 { margin: 0 0 14px; font-size: clamp(2.2rem, 8vw, 4.5rem); line-height: 1.02; }
    h2 { margin: 0 0 8px; font-size: clamp(1.8rem, 4vw, 2.6rem); }
    .hero-role { font-size: clamp(1.1rem, 3vw, 1.8rem); color: #c4c4cf; margin: 0 0 16px; }
    .hero-tagline { color: var(--muted); font-size: 1.05rem; line-height: 1.6; max-width: 640px; }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 24px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px; text-decoration: none; cursor: pointer;
      border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; color: var(--text); background: rgba(255,255,255,.03);
      font-weight: 600;
    }
    .btn-primary { background: var(--gold); color: #0a0a11; border-color: transparent; }
    .stats { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-top: 20px; }
    .stat { padding: 14px; }
    .stat small { display: block; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; font-size: 11px; letter-spacing: .08em; }

    .section-head { margin-bottom: 24px; }
    .section-head .label { text-transform: uppercase; letter-spacing: .12em; font-size: 12px; color: var(--gold); }
    .about-grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; }
    .card { padding: 20px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { border: 1px solid var(--border); background: rgba(255,255,255,.03); border-radius: 999px; padding: 6px 10px; font-size: 12px; color: #d4d4d8; }

    .stack-layout { display: grid; grid-template-columns: 280px 1fr; gap: 16px; }
    .stack-tabs { display: grid; gap: 8px; }
    .stack-tab {
      text-align: left; background: transparent; color: var(--muted); cursor: pointer;
      border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; font: inherit;
    }
    .stack-tab.active { color: #fff; border-color: rgba(212,175,106,.36); background: rgba(212,175,106,.08); }
    .skills { display: flex; flex-wrap: wrap; gap: 8px; }

    .projects-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 14px; }
    .project h3 { margin: 6px 0 8px; }
    .project-sub { color: var(--gold); font-size: 12px; letter-spacing: .08em; text-transform: uppercase; }
    .project p { color: var(--muted); line-height: 1.55; }
    .project-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

    .systems-grid, .hardware-grid { display: grid; gap: 12px; }
    .systems-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .hardware-grid { grid-template-columns: repeat(3, minmax(0,1fr)); margin-top: 12px; }

    .life-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .life-tab {
      border: 1px solid var(--border); border-radius: 999px; padding: 8px 12px; background: transparent; color: var(--muted);
      font: inherit; cursor: pointer;
    }
    .life-tab.active { color: var(--gold); border-color: rgba(212,175,106,.35); background: rgba(212,175,106,.1); }

    .footer-cta { text-align: center; padding: 28px 20px; }
    .contact-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 16px; }
    .footer-note { margin-top: 14px; color: #71717a; font-size: 13px; text-align: center; }

    @media (max-width: 980px) {
      .hero, .about-grid, .stack-layout { grid-template-columns: 1fr; }
      .projects-grid, .systems-grid, .hardware-grid { grid-template-columns: 1fr; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="./jaedon-portfolio.js"></script>
</body>
</html>
